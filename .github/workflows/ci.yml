name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy terrascout
      - run: pytest
      - run: python -m terrascout.runner.reproduce --skip-gif
      - run: python docs/update_readme_kpis.py --check
      - run: python docs/design/render_design_pdfs.py
      - run: python docs/render_project_one_pager_pdf.py
      - run: python docs/render_milestone_demos.py --still-only --output-dir artifacts/milestone_stills
