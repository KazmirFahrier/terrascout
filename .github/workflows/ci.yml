name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy terrascout
      - run: pytest
      - run: python benchmarks/run_benchmark.py
      - run: python benchmarks/control_benchmark.py
      - run: python benchmarks/tracking_benchmark.py
      - run: python benchmarks/localization_benchmark.py
      - run: python benchmarks/scheduler_benchmark.py
      - run: python benchmarks/resource_scheduler_benchmark.py
      - run: python benchmarks/planner_benchmark.py
      - run: python benchmarks/slam_benchmark.py
      - run: python benchmarks/end_to_end_benchmark.py
      - run: python benchmarks/stress_benchmark.py
      - run: python docs/design/render_design_pdfs.py
